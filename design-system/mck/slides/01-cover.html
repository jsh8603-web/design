<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Cover</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="slides.css">
</head>
<body>
<div class="deck-stage">
<section class="slide" data-screen-label="01 Cover">
  <!-- Decorative navy block on left third -->
  <div style="position:absolute; left:0; top:0; width:380px; height:720px; background: var(--surface-inverse);"></div>

  <!-- Pre-title small label -->
  <div style="position:absolute; left:76.8px; top:96px; color:#fff; font-family:var(--font-sans); font-size:14px; letter-spacing:0.18em; text-transform:uppercase; opacity:0.7;">
    Q4 2026
  </div>

  <!-- Vertical client mark -->
  <div style="position:absolute; left:76.8px; bottom:60px; color:#fff; font-family:var(--font-mono); font-size:11px; letter-spacing:0.16em; opacity:0.6; writing-mode:vertical-rl; transform:rotate(180deg);">
    AX LABS · CONFIDENTIAL
  </div>

  <!-- Title block on white -->
  <div style="position:absolute; left:440px; top:200px; width:780px;">
    <div class="kr" style="font-family:var(--font-serif); font-weight:700; font-size:58.67px; line-height:1.05; color:var(--navy); letter-spacing:-0.01em;">
      한국 배터리 산업의<br>다음 5년
    </div>
    <div style="height:2px; width:120px; background: var(--surface-inverse); margin:32px 0;"></div>
    <div class="kr" style="font-family:var(--font-serif); font-size:24px; line-height:1.4; color:var(--gray-800);">
      글로벌 리더십을 결정짓는<br>세 가지 의사결정
    </div>
    <div style="margin-top:120px; display:flex; gap:48px; font-family:var(--font-sans); font-size:13px; color:var(--gray-600);">
      <div>
        <div style="font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:var(--gray-500); margin-bottom:4px;">Prepared for</div>
        <div class="kr" style="font-weight:600; color:var(--gray-900);">이사회</div>
      </div>
      <div>
        <div style="font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:var(--gray-500); margin-bottom:4px;">Date</div>
        <div style="font-weight:600; color:var(--gray-900);">2026.05</div>
      </div>
      <div>
        <div style="font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:var(--gray-500); margin-bottom:4px;">Author</div>
        <div class="kr" style="font-weight:600; color:var(--gray-900);">전략기획팀</div>
      </div>
    </div>
  </div>
</section>
</div>
</body>
</html>
