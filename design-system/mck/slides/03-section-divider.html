<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Section divider</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="slides.css">
</head>
<body>
<div class="deck-stage">
<section class="slide" data-screen-label="03 Section divider" style="background: var(--surface-inverse);">

  <!-- Hairline accent top -->
  <div style="position:absolute; left:76.8px; top:76.8px; width:120px; height:2px; background:#fff;"></div>

  <div style="position:absolute; left:76.8px; top:120px; color:rgba(255,255,255,0.65); font-family:var(--font-mono); font-size:14px; letter-spacing:0.24em;">
    SECTION 01
  </div>

  <div class="kr" style="position:absolute; left:76.8px; top:200px; width:1000px; font-family:var(--font-serif); font-weight:700; font-size:80px; line-height:1.05; color:#fff; letter-spacing:-0.015em;">
    시장 맥락
  </div>

  <div class="kr" style="position:absolute; left:76.8px; top:380px; width:900px; font-family:var(--font-serif); font-size:28px; line-height:1.4; color:rgba(255,255,255,0.85);">
    세 가지 구조적 이동이<br>
    다음 5년의 게임룰을 다시 쓴다
  </div>

  <!-- Bottom meta row -->
  <div style="position:absolute; left:76.8px; bottom:60px; right:76.8px; display:flex; justify-content:space-between; font-family:var(--font-sans); font-size:12px; color:rgba(255,255,255,0.55);">
    <div class="kr">한국 배터리 산업의 다음 5년</div>
    <div>3 / 12</div>
  </div>

</section>
</div>
</body>
</html>
