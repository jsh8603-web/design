<!DOCTYPE html>
<html lang="ko" data-theme="modern">
<head>
<meta charset="utf-8">
<title>scenario summary demo</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); }
  .deck-stage section {
    width:1280px; height:720px; background:var(--bg); color:var(--text);
    position:relative; overflow:hidden; box-sizing:border-box;
  }
  .s-title {
    position:absolute; left:76.8px; top:14.4px; width:1126.4px; height:86.4px;
    display:flex; align-items:center; font-family:var(--font-display);
    font-weight:700; font-size:29.33px; line-height:1.2; color:var(--heading);
    letter-spacing:-0.005em;
  }
  .s-rule { position:absolute; left:76.8px; top:100.8px; width:1126.4px; height:2px; background:var(--heading); }
  .s-source { position:absolute; left:76.8px; top:676.8px; font-size:12px; color:var(--gray-2); }
  .s-pagenum { position:absolute; right:76.8px; top:676.8px; font-size:12px; color:var(--gray-2); }
  .chart-wrap { position:absolute; left:76.8px; top:138px; width:1126.4px; height:506px; }
</style>
</head>
<body>
<div class="deck-stage">
  <section data-layout="scenario-summary" data-screen-label="scenario summary demo">
    <div class="s-title">시나리오 분석 — Upside 영업이익 250억 vs Downside 120억</div>
    <div class="s-rule"></div>
    <div class="chart-wrap"><div id="sc1" style="width:100%;"></div></div>
    <div class="s-source">출처: FP&A 시나리오 플래닝 (예시 데이터)</div>
    <div class="s-pagenum">8</div>
  </section>
</div>
<script type="module">
import { renderScenarioSummary } from "../assets/scenario-summary.js";
renderScenarioSummary("#sc1", {
  scenarios: ["Downside", "Base", "Upside"],
  metrics: [
    { label: "매출",      values: [1100, 1300, 1500], unit: "억" },
    { label: "영업이익",   values: [120, 180, 250],    unit: "억" },
    { label: "영업이익률", values: [10.9, 13.8, 16.7], unit: "%" }
  ]
});
</script>
</body>
</html>
