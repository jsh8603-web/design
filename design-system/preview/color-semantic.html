<!doctype html>
<!-- @dsCard group="Colors" name="Semantic state colors" subtitle="success / warn / danger / info — used sparingly" viewport="700x160" --><html lang="en"><head><meta charset="utf-8"><title>semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 700px; background: var(--neutral-100); font-family: var(--font-sans); color: var(--neutral-900); -webkit-font-smoothing: antialiased; }
body { padding: 20px 24px; }
.meta { font-family: var(--font-mono); font-size: 10px; color: var(--neutral-600); letter-spacing: 0.02em; }

</style></head><body>
    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
      <div style="border-radius:12px; padding:12px; background:#ECFDF5; border:1px solid #A7F3D0;">
        <div style="font-size:10px; font-weight:700; letter-spacing:0.06em; color:#047857; text-transform:uppercase;">Success</div>
        <div style="font-size:18px; font-weight:700; color:#065F46; margin-top:6px;">+23%</div>
        <div style="font-family:var(--font-mono); font-size:10px; color:#047857; margin-top:4px;">#10B981</div>
      </div>
      <div style="border-radius:12px; padding:12px; background:#FFFBEB; border:1px solid #FDE68A;">
        <div style="font-size:10px; font-weight:700; letter-spacing:0.06em; color:#92400E; text-transform:uppercase;">Warn</div>
        <div style="font-size:18px; font-weight:700; color:#78350F; margin-top:6px;">Review</div>
        <div style="font-family:var(--font-mono); font-size:10px; color:#B45309; margin-top:4px;">#F59E0B</div>
      </div>
      <div style="border-radius:12px; padding:12px; background:#FEF2F2; border:1px solid #FECACA;">
        <div style="font-size:10px; font-weight:700; letter-spacing:0.06em; color:#B91C1C; text-transform:uppercase;">Danger</div>
        <div style="font-size:18px; font-weight:700; color:#7F1D1D; margin-top:6px;">−12%</div>
        <div style="font-family:var(--font-mono); font-size:10px; color:#DC2626; margin-top:4px;">#EF4444</div>
      </div>
      <div style="border-radius:12px; padding:12px; background:#EFF6FF; border:1px solid #BFDBFE;">
        <div style="font-size:10px; font-weight:700; letter-spacing:0.06em; color:#1D4ED8; text-transform:uppercase;">Info</div>
        <div style="font-size:18px; font-weight:700; color:#1E3A8A; margin-top:6px;">Note</div>
        <div style="font-family:var(--font-mono); font-size:10px; color:#2563EB; margin-top:4px;">#3B82F6</div>
      </div>
    </div></body></html>
