<!doctype html>
<!-- @dsCard group="Components" name="Cards — slide vs app" subtitle="White-on-warm vs slate-with-shadow" viewport="700x180" --><html lang="en"><head><meta charset="utf-8"><title>cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 700px; background: var(--neutral-100); font-family: var(--font-sans); color: var(--neutral-900); -webkit-font-smoothing: antialiased; }
body { padding: 20px 24px; }
.meta { font-family: var(--font-mono); font-size: 10px; color: var(--neutral-600); letter-spacing: 0.02em; }

</style></head><body>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 14px;">
      <div>
        <div style="background:#FFFFFF; border-radius:8pt; padding:14pt 16pt;">
          <div style="font-size:10pt; font-weight:600; color:#1428A0; letter-spacing:0.06em; text-transform:uppercase;">Slide card</div>
          <div style="font-size:26pt; font-weight:800; color:#1A1A1A; line-height:1.1; margin-top:4pt;">43.6</div>
          <div style="font-size:10pt; color:#1A1A1A;">조원 · YoY +33%</div>
        </div>
        <div class="meta" style="margin-top:6px;">white / 8pt radius / NO shadow</div>
      </div>
      <div>
        <div style="background:#0F172A; border:1px solid #1E293B; border-radius:8px; padding:14px 16px; box-shadow:0 1px 2px rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.2);">
          <div style="font-size:10px; font-weight:600; color:#60A5FA; letter-spacing:0.06em; text-transform:uppercase;">App card</div>
          <div style="font-size:26px; font-weight:800; color:#F8FAFC; line-height:1.1; margin-top:4px;">43.6</div>
          <div style="font-size:11px; color:#94A3B8;">조원 · YoY +33%</div>
        </div>
        <div class="meta" style="margin-top:6px;">slate / elev-1 / 1px border</div>
      </div>
    </div></body></html>
