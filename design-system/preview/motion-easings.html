<!doctype html>
<!-- @dsCard group="Spacing" name="Motion — easings" subtitle="M3 emphasized easings · editor only" viewport="700x220" --><html lang="en"><head><meta charset="utf-8"><title>motion</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 700px; background: var(--neutral-100); font-family: var(--font-sans); color: var(--neutral-900); -webkit-font-smoothing: antialiased; }
body { padding: 20px 24px; }
.meta { font-family: var(--font-mono); font-size: 10px; color: var(--neutral-600); letter-spacing: 0.02em; }

</style></head><body>
    <style>
      .track { position:relative; height:32px; background:var(--neutral-200); border-radius:4px; overflow:hidden; }
      .dot { position:absolute; top:6px; left:0; width:20px; height:20px; border-radius:50%; background:var(--accent-orange); animation: slide 2.4s infinite; }
      .e-standard .dot { animation-timing-function: cubic-bezier(0.2, 0, 0, 1); }
      .e-in       .dot { animation-timing-function: cubic-bezier(0.3, 0, 0.8, 0.15); }
      .e-out      .dot { animation-timing-function: cubic-bezier(0.05, 0.7, 0.1, 1); }
      @keyframes slide { 0%, 30%  { left:0;            } 50%, 80% { left: calc(100% - 20px);} 100% { left: 0; } }
    </style>
    <div style="display:flex; flex-direction:column; gap:14px;">
      
        <div>
          <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <div style="font-size:11px; font-weight:600;">--ease-standard</div>
            <div class="meta">cubic-bezier(0.2, 0, 0, 1)</div>
          </div>
          <div class="track e-standard"><div class="dot"></div></div>
        </div>
      
        <div>
          <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <div style="font-size:11px; font-weight:600;">--ease-in</div>
            <div class="meta">cubic-bezier(0.3, 0, 0.8, 0.15)</div>
          </div>
          <div class="track e-in"><div class="dot"></div></div>
        </div>
      
        <div>
          <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <div style="font-size:11px; font-weight:600;">--ease-out</div>
            <div class="meta">cubic-bezier(0.05, 0.7, 0.1, 1)</div>
          </div>
          <div class="track e-out"><div class="dot"></div></div>
        </div>
      
    </div></body></html>
