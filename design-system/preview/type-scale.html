<!doctype html>
<!-- @dsCard group="Type" name="Type scale" subtitle="M3 type roles in Pretendard" viewport="700x360" -->
<html lang="en"><head><meta charset="utf-8"><title>type-scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 700px; background: var(--neutral-100); font-family: var(--font-sans); color: var(--neutral-900); -webkit-font-smoothing: antialiased; }
  body { padding: 20px 24px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .col { display: flex; flex-direction: column; }
  .mono { font-family: var(--font-mono); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--neutral-600); letter-spacing: 0.02em; }
  
</style></head><body>
    <div style="display:flex; flex-direction:column; gap:18px;">
      <div style="display:flex; align-items:baseline; gap:14px;">
        <div style="font-size:48px; font-weight:500; letter-spacing:-0.02em; line-height:1; color:var(--neutral-900);">Display</div>
        <div class="meta">48 / 500 / -2%</div>
      </div>
      <div style="display:flex; align-items:baseline; gap:14px;">
        <div style="font-size:32px; font-weight:600; letter-spacing:-0.02em; line-height:1; color:var(--neutral-900);">Headline</div>
        <div class="meta">32 / 600 / -2%</div>
      </div>
      <div style="display:flex; align-items:baseline; gap:14px;">
        <div style="font-size:22px; font-weight:600; letter-spacing:-0.01em; line-height:1; color:var(--neutral-900);">Title large</div>
        <div class="meta">22 / 600</div>
      </div>
      <div style="display:flex; align-items:baseline; gap:14px;">
        <div style="font-size:16px; font-weight:400; line-height:1; color:var(--neutral-900);">Body large — the quick brown fox jumps</div>
        <div class="meta">16 / 400</div>
      </div>
      <div style="display:flex; align-items:baseline; gap:14px;">
        <div style="font-size:14px; font-weight:400; line-height:1; color:var(--neutral-900);">Body medium — default running text</div>
        <div class="meta">14 / 400</div>
      </div>
      <div style="display:flex; align-items:baseline; gap:14px;">
        <div style="font-size:12px; font-weight:600; line-height:1; letter-spacing:0.04em; text-transform:uppercase; color:var(--neutral-600);">Label · caption</div>
        <div class="meta">12 / 600 / 4%</div>
      </div>
    </div></body></html>
