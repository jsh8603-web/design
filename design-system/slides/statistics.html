<!DOCTYPE html>
<!-- @dsCard group="Slides" name="Slide — Statistics" subtitle="3 KPI tiles · hero numbers · mixed bg" viewport="960x540" -->
<html lang="ko" data-theme="modern">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 720px;
      font-family: 'Pretendard', sans-serif;
      background: #f5f5f0;
      padding: 71.11px 85.33px;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body data-layout="three_stat" data-screen-label="legacy · three_stat">
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 56.89px;">
    <h2 style="font-size: 49.78px; font-weight: 600; color: #1a1a1a;">Key Metrics</h2>
    <p style="font-size: 17.78px; color: #999;">03</p>
  </div>

  <!-- 통계 카드 그리드 -->
  <div style="flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 42.67px;">
    <div style="background: #1a1a1a; border-radius: 21.33px; padding: 49.78px; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 17.78px; color: #888; text-transform: uppercase; letter-spacing: 0.05em;">Revenue Growth</p>
      <div>
        <p style="font-size: 85.33px; font-weight: 600; color: #ffffff; letter-spacing: -0.02em;">85%</p>
        <p style="font-size: 19.56px; color: #666; margin-top: 14.22px;">Year over year</p>
      </div>
    </div>
    <div style="background: #ffffff; border-radius: 21.33px; padding: 49.78px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #e5e5e0;">
      <p style="font-size: 17.78px; color: #888; text-transform: uppercase; letter-spacing: 0.05em;">Active Users</p>
      <div>
        <p style="font-size: 85.33px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.02em;">2.4M</p>
        <p style="font-size: 19.56px; color: #888; margin-top: 14.22px;">+340K this quarter</p>
      </div>
    </div>
    <div style="background: #ffffff; border-radius: 21.33px; padding: 49.78px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #e5e5e0;">
      <p style="font-size: 17.78px; color: #888; text-transform: uppercase; letter-spacing: 0.05em;">Customer Satisfaction</p>
      <div>
        <p style="font-size: 85.33px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.02em;">4.9</p>
        <p style="font-size: 19.56px; color: #888; margin-top: 14.22px;">Out of 5.0 rating</p>
      </div>
    </div>
  </div>

  <!-- 푸터 -->
  <div style="display: flex; justify-content: flex-end; padding-top: 28.44px;">
    <p style="font-size: 16px; color: #999;">Source: Internal Analytics 2025</p>
  </div>

<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>

</body>
</html>
