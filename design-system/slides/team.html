<html lang="ko" data-theme="modern">
<head>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1280px; height:720px; overflow:hidden;
    font-family:var(--font-sans);
    background:var(--theme-bg); color:var(--theme-text);
    position:relative;
  }
  .s-title  { position:absolute; left:76.8px; top:14.4px; width:1126.4px; height:86.4px; display:flex; align-items:center; font-family:var(--font-display); font-weight:700; font-size:29.33px; color:var(--primary); letter-spacing:-0.005em; }
  .s-rule   { position:absolute; left:76.8px; top:100.8px; width:1126.4px; height:2px; background:var(--primary); }
  .grid     { position:absolute; left:76.8px; top:150px; width:1126.4px; display:grid; grid-template-columns:repeat(4,1fr); gap:32px; }
  .person   { text-align:left; }
  .person .photo { width:100%; aspect-ratio:1; border-radius:8px; overflow:hidden; margin-bottom:18px; }
  .person .photo .image-slot { width:100%; height:100%; border-radius:8px; }
  .person .nm { font-family:var(--font-display); font-weight:700; font-size:21px; color:var(--gray-1); }
  .person .ro { font-size:14px; color:var(--accent); font-weight:600; margin-top:4px; }
  .person .bio { font-size:13px; color:var(--gray-2); line-height:1.5; margin-top:8px; }
  .s-source { position:absolute; left:76.8px; top:676.8px; font-size:12px; color:var(--gray-2); }
  .s-pagenum{ position:absolute; right:76.8px; top:676.8px; font-size:12px; color:var(--gray-2); }

</head>

<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>

</body>
</html>
