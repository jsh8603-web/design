<!doctype html>
<html lang="ko" data-theme="dark-pitch">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--gray-1); font-family: var(--font-sans); overflow: hidden; }
  .slide { width: 1280px; height: 720px; padding: 80px; position: relative; display: flex; flex-direction: column; justify-content: center; }
  .bar { position: absolute; left: 0; top: 0; width: 8px; height: 720px; background: var(--accent); }
  .kicker { font-family: var(--font-mono); font-size: 16px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 28px; }
  .title { font-family: var(--font-serif); font-size: 76px; font-weight: 700; color: var(--heading); line-height: 1.08; letter-spacing: -0.02em; }
  .sub { margin-top: 32px; font-size: 22px; color: var(--gray-2); line-height: 1.4; max-width: 820px; }
  .meta { position: absolute; bottom: 80px; left: 80px; display: flex; gap: 64px; }
  .meta .item { font-size: 15px; color: var(--gray-1); }
  .meta .l { font-family: var(--font-mono); color: var(--accent); font-size: 12px; letter-spacing: 0.08em; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="slide">
  <div class="bar"></div>
  <div class="kicker">// STRATEGY REVIEW · FY26</div>
  <div class="title">한국 배터리 산업의<br>다음 5년</div>
  <div class="sub">글로벌 리더십을 결정짓는 세 가지 의사결정</div>
  <div class="meta">
    <div class="item"><div class="l">PREPARED FOR</div>이사회</div>
    <div class="item"><div class="l">DATE</div>2026.05</div>
    <div class="item"><div class="l">AUTHOR</div>전략기획팀</div>
  </div>
</div>
</body>
</html>
