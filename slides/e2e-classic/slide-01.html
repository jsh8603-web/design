<!doctype html>
<html lang="ko" data-theme="classic">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--gray-1); font-family: var(--font-sans); overflow: hidden; }
  .slide { width: 1280px; height: 720px; padding: 88px 96px; position: relative; display: flex; flex-direction: column; justify-content: center; }
  .bar { position: absolute; left: 0; top: 0; width: 10px; height: 720px; background: var(--accent); }
  .kicker { font-family: var(--font-mono); font-size: 16px; color: var(--accent); letter-spacing: 0.14em; margin-bottom: 30px; }
  .title { font-size: 72px; font-weight: 700; color: var(--heading); line-height: 1.1; letter-spacing: -0.02em; max-width: 980px; }
  .sub { margin-top: 30px; font-size: 23px; color: var(--gray-2); line-height: 1.45; max-width: 820px; }
  .rule { position: absolute; left: 96px; bottom: 168px; width: 1088px; height: 1px; background: var(--gray-4); }
  .meta { position: absolute; bottom: 88px; left: 96px; display: flex; gap: 72px; }
  .meta .l { font-family: var(--font-mono); color: var(--accent); font-size: 12px; letter-spacing: 0.08em; margin-bottom: 8px; }
  .meta .v { font-size: 16px; color: var(--gray-1); font-weight: 600; }
</style>
</head>
<body>
<div class="slide">
  <div class="bar"></div>
  <div class="kicker">// GROWTH STRATEGY · FY26</div>
  <div class="title">전사 수익성 회복을<br>위한 세 가지 레버</div>
  <div class="sub">2026년 영업이익률 +5.2%p 개선을 위한 우선순위와 실행 로드맵</div>
  <div class="rule"></div>
  <div class="meta">
    <div class="item"><div class="l">PREPARED FOR</div><div class="v">경영위원회</div></div>
    <div class="item"><div class="l">DATE</div><div class="v">2026.06</div></div>
    <div class="item"><div class="l">AUTHOR</div><div class="v">전략기획실</div></div>
  </div>
</div>
</body>
</html>
