<!doctype html>
<html lang="ko" data-theme="classic">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--gray-1); font-family: var(--font-sans); overflow: hidden; }
  .slide { width: 1280px; height: 720px; padding: 64px 96px; position: relative; }
  .kicker { font-family: var(--font-mono); font-size: 15px; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 16px; }
  .title { font-size: 32px; font-weight: 700; color: var(--heading); line-height: 1.22; margin-bottom: 52px; max-width: 1040px; }
  .body { display: grid; grid-template-columns: 500px 1fr; gap: 72px; }
  .hero-num { font-weight: 700; font-size: 208px; line-height: 0.86; color: var(--accent); letter-spacing: -0.04em; }
  .hero-num span { font-size: 96px; vertical-align: 18%; }
  .hero-cap { margin-top: 22px; font-size: 17px; color: var(--gray-2); line-height: 1.5; max-width: 440px; }
  .facts { display: flex; flex-direction: column; gap: 24px; }
  .fact { background: var(--surface-inverse); border-left: 4px solid var(--accent); padding: 22px 28px; border-radius: 8px; }
  .fact .n { font-weight: 700; font-size: 36px; color: var(--surface-inverse-fg); line-height: 1; }
  .fact .d { margin-top: 10px; font-size: 15px; color: var(--gray-3); line-height: 1.45; }
  .source { position: absolute; bottom: 32px; left: 96px; font-size: 12px; color: var(--gray-3); }
  .page { position: absolute; bottom: 32px; right: 96px; font-family: var(--font-mono); font-size: 12px; color: var(--gray-3); }
</style>
</head>
<body>
<div class="slide">
  <div class="kicker">// COST STRUCTURE</div>
  <div class="title">고정비 비중 58% 도달 — 매출 둔화 국면에서 손익 레버리지 악화</div>
  <div class="body">
    <div>
      <div class="hero-num">58<span>%</span></div>
      <div class="hero-cap">2025년 기준 총원가 중 고정비 비중. 2022년 41% 대비 17%p 상승하며 변동비 대비 구조적 부담 확대.</div>
    </div>
    <div class="facts">
      <div class="fact"><div class="n">2.3×</div><div class="d">3년간 고정비 증가 배수 · 매출 증가는 1.3×에 그침</div></div>
      <div class="fact"><div class="n">–4.1%p</div><div class="d">동기간 영업이익률 누적 하락 폭 · 추세는 가속 중</div></div>
      <div class="fact"><div class="n">₩820억</div><div class="d">손익분기 매출 도달까지 추가 필요 연매출 규모</div></div>
    </div>
  </div>
  <div class="source">Source: 재무관리실 원가 분석, FY22–FY25 실적 · 관리회계 기준</div>
  <div class="page">02 / 12</div>
</div>
</body>
</html>
