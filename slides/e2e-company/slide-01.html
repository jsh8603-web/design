<!doctype html>
<html lang="ko" data-theme="company">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--theme-text); font-family: var(--font-sans); overflow: hidden; position: relative; }
  .slide { width: 1280px; height: 720px; padding: 92px 96px; position: relative; display: flex; flex-direction: column; justify-content: center; }
  .bar { position: absolute; left: 0; top: 0; width: 10px; height: 720px; background: var(--accent); }
  .brand { position: absolute; top: 58px; left: 96px; display: flex; align-items: center; gap: 14px; }
  .brand .mark { width: 30px; height: 30px; background: var(--primary); border-radius: 6px; }
  .brand .name { font-size: 17px; font-weight: 700; color: var(--primary); letter-spacing: 0.02em; }
  .kicker { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 28px; }
  .title { font-size: 70px; font-weight: 800; color: var(--primary); line-height: 1.08; letter-spacing: -0.02em; }
  .sub { margin-top: 28px; font-size: 23px; color: var(--gray-2); line-height: 1.45; max-width: 900px; }
  .meta { position: absolute; bottom: 72px; left: 96px; display: flex; gap: 72px; }
  .meta .l { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .meta .v { font-size: 16px; font-weight: 600; color: var(--primary); }
</style>
</head>
<body>
<div class="slide">
  <div class="bar"></div>
  <div class="brand"><div class="mark"></div><div class="name">ATLAS CORPORATION</div></div>
  <div class="kicker">FY2026 Mid-Year Business Review</div>
  <div class="title">상반기 실적 점검과<br>하반기 성장 가속 전략</div>
  <div class="sub">반도체·HBM 수요 확대 국면에서 전사 운영 효율과 시장 확장을 동시에 달성하기 위한 핵심 지표와 실행 과제를 정리했습니다.</div>
  <div class="meta">
    <div class="item"><div class="l">Prepared For</div><div class="v">경영위원회</div></div>
    <div class="item"><div class="l">Date</div><div class="v">2026.06</div></div>
    <div class="item"><div class="l">Owner</div><div class="v">전략기획본부</div></div>
  </div>
</div>
</body>
</html>
