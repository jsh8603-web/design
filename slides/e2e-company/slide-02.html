<!doctype html>
<html lang="ko" data-theme="company">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--theme-text); font-family: var(--font-sans); overflow: hidden; position: relative; }
  .slide { width: 1280px; height: 720px; padding: 60px 72px 56px; position: relative; display: flex; flex-direction: column; }
  .bar { position: absolute; left: 0; top: 0; width: 8px; height: 720px; background: var(--accent); }
  .kicker { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
  .title { font-size: 31px; font-weight: 800; color: var(--primary); line-height: 1.18; letter-spacing: -0.01em; max-width: 1080px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 34px; }
  .card { background: var(--gray-4); border-radius: 12px; padding: 22px 22px 20px; border-top: 4px solid var(--accent); }
  .card .lbl { font-size: 13px; font-weight: 700; color: var(--gray-2); letter-spacing: 0.04em; margin-bottom: 14px; }
  .card .num { font-size: 46px; font-weight: 800; color: var(--primary); line-height: 1; letter-spacing: -0.02em; }
  .card .num small { font-size: 21px; font-weight: 700; color: var(--gray-2); }
  .card .cap { margin-top: 12px; font-size: 13px; color: var(--gray-2); line-height: 1.4; }
  .card .cap b { color: var(--positive); font-weight: 700; }
  .card .cap b.dn { color: var(--negative); }
  .chartwrap { margin-top: 30px; background: var(--gray-4); border-radius: 12px; padding: 22px 28px 18px; flex: 1; display: flex; flex-direction: column; }
  .chartwrap .ct { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
  .chartwrap .cs { font-size: 12px; color: var(--gray-2); margin-bottom: 16px; }
  .chart { display: flex; align-items: flex-end; gap: 26px; flex: 1; padding-bottom: 26px; position: relative; }
  .col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; position: relative; }
  .col .bv { font-size: 14px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
  .col .bk { width: 100%; max-width: 64px; background: var(--primary); border-radius: 5px 5px 0 0; }
  .col:last-child .bk { background: var(--accent); }
  .col .bl { position: absolute; bottom: -22px; font-size: 12px; font-weight: 600; color: var(--gray-2); }
</style>
</head>
<body>
<div class="slide">
  <div class="bar"></div>
  <div class="kicker">상반기 핵심 성과 지표</div>
  <div class="title">매출 4.2B$ · 영업이익률 28%로 연초 목표 상회</div>
  <div class="grid">
    <div class="card">
      <div class="lbl">반기 매출</div>
      <div class="num">4.2<small>&#8201;B$</small></div>
      <div class="cap">전년 동기 <b>+23%</b> · 목표 대비 +6%p</div>
    </div>
    <div class="card">
      <div class="lbl">영업이익률</div>
      <div class="num">28<small>&#8201;%</small></div>
      <div class="cap">전년 <b>+4.1%p</b> · HBM 믹스 개선</div>
    </div>
    <div class="card">
      <div class="lbl">HBM 출하</div>
      <div class="num">1.8<small>&#8201;×</small></div>
      <div class="cap">전년 대비 <b>+82%</b> 물량 확대</div>
    </div>
    <div class="card">
      <div class="lbl">재고일수</div>
      <div class="num">42<small>&#8201;일</small></div>
      <div class="cap"><b class="dn">-9일</b> 단축 · 운전자본 개선</div>
    </div>
  </div>
  <div class="chartwrap">
    <div class="ct">분기별 매출 추이 (단위 B$)</div>
    <div class="cs">FY2025 Q3 ~ FY2026 Q2 · 4개 분기 연속 성장</div>
    <div class="chart">
      <div class="col"><div class="bv">1.7</div><div class="bk" style="height:46%"></div><div class="bl">25 Q3</div></div>
      <div class="col"><div class="bv">1.9</div><div class="bk" style="height:54%"></div><div class="bl">25 Q4</div></div>
      <div class="col"><div class="bv">2.0</div><div class="bk" style="height:60%"></div><div class="bl">26 Q1</div></div>
      <div class="col"><div class="bv">2.2</div><div class="bk" style="height:72%"></div><div class="bl">26 Q2</div></div>
    </div>
  </div>
</div>
</body>
</html>
