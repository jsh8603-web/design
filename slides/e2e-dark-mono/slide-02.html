<!DOCTYPE html>
<!-- @dsCard group="Data" name="02 Dark Mono — KPI hero" subtitle="dark monotone · hero number + fact cards" viewport="960x540" --><html lang="ko" data-theme="dark-mono"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../design-system/colors_and_type.css"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1280px; height:720px; overflow:hidden;
  font-family:'Pretendard', -apple-system, sans-serif;
  background:var(--theme-bg); color:var(--theme-text);
  padding:64px 80px; position:relative;
}
.kicker {
  font-family:'JetBrains Mono', monospace; font-size:15px; color:var(--accent);
  letter-spacing:0.1em; margin-bottom:16px;
}
.title { font-size:32px; font-weight:700; color:var(--heading); line-height:1.2; margin-bottom:48px; max-width:1040px; }
.body { display:grid; grid-template-columns:520px 1fr; gap:64px; }
.hero-num {
  font-family:'Pretendard', sans-serif; font-weight:700; font-size:200px;
  line-height:0.88; color:var(--accent); letter-spacing:-0.04em;
}
.hero-num span { font-size:92px; vertical-align:18%; }
.hero-cap { margin-top:20px; font-size:17px; color:var(--gray-2); line-height:1.5; max-width:440px; }
.facts { display:flex; flex-direction:column; gap:24px; }
.fact { background:var(--surface-inverse); border-left:3px solid var(--accent); padding:20px 26px; border-radius:8px; }
.fact .n { font-weight:700; font-size:36px; color:var(--gray-1); line-height:1; }
.fact .n.pos { color:var(--positive); }
.fact .n.neg { color:var(--negative); }
.fact .d { margin-top:10px; font-size:15px; color:var(--gray-2); line-height:1.45; }
.source { position:absolute; bottom:32px; left:80px; font-size:12px; color:var(--gray-2); }
.page { position:absolute; bottom:32px; right:80px; font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--gray-2); }
</style></head><body data-layout="kpi-hero" data-screen-label="02-dark-mono · kpi">

<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
</body></html>
