<!DOCTYPE html>
<!-- @dsCard group="Brand" name="04 Editorial Magazine — kpi dashboard" subtitle="KPI cards + bar chart · terracotta" viewport="960x540" --><html lang="ko" data-theme="editorial"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  body { background:var(--theme-bg); padding:52px 72px; color:var(--primary); display:flex; flex-direction:column; }
  .head { display:flex; justify-content:space-between; align-items:baseline; border-bottom:2px solid var(--primary); padding-bottom:14px; }
  .head h2 { font-size:30.22px; font-weight:600; letter-spacing:-0.01em; }
  .head .pg { font-size:16px; color:var(--gray-2); letter-spacing:0.08em; text-transform:uppercase; }
  .head .pg em { color:var(--accent); font-style:normal; font-weight:600; }
  .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:21.33px; margin-top:28.44px; }
  .card { background:var(--theme-bg-card); border:1px solid var(--rule-soft, #D8D2C9); border-top:3px solid var(--accent); padding:20px 21.33px 21.33px; }
  .card .label { font-size:14.22px; color:var(--gray-2); letter-spacing:0.06em; text-transform:uppercase; }
  .card .v { font-size:55px; font-weight:500; color:var(--primary); line-height:1.05; margin-top:12px; letter-spacing:-0.02em; }
  .card .v small { font-size:23.11px; color:var(--accent); font-weight:600; padding-left:3.56px; }
  .card .cap { font-size:14.22px; color:var(--gray-1); line-height:1.5; margin-top:12.44px; }
  .chartwrap { margin-top:30px; }
  .chartwrap h3 { font-size:18.67px; font-weight:600; color:var(--primary); margin-bottom:17.78px; }
  .chart { display:grid; grid-template-columns:130px 1fr 64px; row-gap:14.22px; column-gap:17.78px; align-items:center; }
  .chart .name { font-size:16px; color:var(--gray-1); }
  .chart .track { height:24px; background:var(--theme-bg-alt); }
  .chart .fill { height:24px; background:var(--accent); }
  .chart .fill.muted { background:var(--gray-2); }
  .chart .pct { font-size:16px; color:var(--primary); font-family:'Newsreader', serif; text-align:right; }
</style><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1280px; height:720px; overflow:hidden; font-family:'Pretendard', -apple-system, sans-serif; position:relative; }
.serif { font-family: 'Newsreader', 'Times New Roman', serif; font-feature-settings: 'lnum'; }
</style></head><body data-layout="kpi_dashboard" data-screen-label="04-editorial · kpi_dashboard"><div class="head">

  </div>

  </div>
</div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>

</body></html>
