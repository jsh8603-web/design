<!DOCTYPE html>
<!-- @dsCard group="Brand" name="04 Editorial Magazine — kpi dashboard" subtitle="KPI cards + bar chart · terracotta" viewport="960x540" --><html lang="ko" data-theme="editorial"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  body { background:var(--theme-bg); padding:40px 64px; color:var(--primary); display:grid; grid-template-rows: auto auto 1fr; gap:24px; }
  .head { display:flex; align-items:baseline; justify-content:space-between; border-bottom:1px solid var(--rule-soft, #D8D2C9); padding-bottom:16px; }
  .head h2 { font-size:19.56px; font-weight:600; color:var(--accent); letter-spacing:0.16em; text-transform:uppercase; }
  .head .pg { font-size:17.78px; color:var(--gray-2); font-family:'Newsreader', serif; font-style:italic; }
  .cards { display:grid; grid-template-columns: repeat(3, 1fr); gap:28px; }
  .card { border-top:3.56px solid var(--primary); padding-top:16px; display:flex; flex-direction:column; gap:6px; }
  .card .label { font-size:14px; color:var(--gray-2); letter-spacing:0.12em; text-transform:uppercase; font-weight:600; }
  .card .v { font-size:72px; font-weight:400; color:var(--accent); letter-spacing:-0.025em; line-height:1; font-family:'Newsreader', serif; }
  .card .v small { font-size:28px; color:var(--primary); }
  .card .cap { font-size:14px; color:var(--gray-1); line-height:1.4; }
  .chartwrap { display:grid; grid-template-columns: 1fr; gap:10px; }
  .chartwrap h3 { font-size:16px; color:var(--gray-2); letter-spacing:0.1em; text-transform:uppercase; font-weight:600; }
  .chart { display:grid; grid-template-columns: 120px 1fr 64px; gap:12px 16px; align-items:center; }
  .chart .name { font-size:15px; color:var(--primary); font-weight:500; text-align:right; }
  .chart .track { height:22px; background:var(--gray-4); position:relative; }
  .chart .fill { height:22px; background:var(--accent); }
  .chart .fill.muted { background:var(--gray-2); }
  .chart .pct { font-size:15px; color:var(--primary); font-family:'Newsreader', serif; }
</style><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1280px; height:720px; overflow:hidden; font-family:'Pretendard', -apple-system, sans-serif; position:relative; }
.serif { font-family: 'Newsreader', 'Times New Roman', serif; font-feature-settings: 'lnum'; }
</style></head><body data-layout="kpi_dashboard" data-screen-label="04-editorial · kpi_dashboard"><div class="head">
  <h2>Dashboard · HBM 사이클</h2>
  <div class="pg">page <em>05</em></div>
</div>
<div class="cards">
  <div class="card">
    <div class="label">HBM TAM · 2027E</div>
    <div class="v serif">67<small>B$</small></div>
    <div class="cap">2년 만에 230억$ → 670억$, 연평균 +71% 확장.</div>
  </div>
  <div class="card">
    <div class="label">SK Hynix 점유율</div>
    <div class="v serif">52<small>%</small></div>
    <div class="cap">HBM3E 시장 사실상 단독 공급 지위.</div>
  </div>
  <div class="card">
    <div class="label">'26 CapEx · YoY</div>
    <div class="v serif">+44<small>%</small></div>
    <div class="cap">팹·전력 인프라 동시 증설 가속.</div>
  </div>
</div>
<div class="chartwrap">
  <h3>공급사별 HBM3E 가용 캐파 (2026E, % of total)</h3>
  <div class="chart">
    <div class="name">SK Hynix</div><div class="track"><div class="fill" style="width:52%"></div></div><div class="pct">52%</div>
    <div class="name">Samsung</div><div class="track"><div class="fill muted" style="width:31%"></div></div><div class="pct">31%</div>
    <div class="name">Micron</div><div class="track"><div class="fill muted" style="width:14%"></div></div><div class="pct">14%</div>
    <div class="name">기타</div><div class="track"><div class="fill muted" style="width:3%"></div></div><div class="pct">3%</div>
  </div>
</div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>

</body></html>
