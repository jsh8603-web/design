<!doctype html>
<!-- @dsCard group="Slides" name="Slide — Cover" subtitle="left navy panel + title block + meta strip" viewport="960x540" -->
<html lang="ko" data-theme="modern">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--gray-1); font-family: var(--font-sans); overflow: hidden; position: relative; display: flex; }
  .panel { width: 420px; height: 720px; background: var(--surface-inverse); color: var(--surface-inverse-fg); padding: 56px 48px; display: flex; flex-direction: column; justify-content: space-between; flex-shrink: 0; }
  .panel .brand { display: flex; align-items: center; gap: 12px; }
  .panel .brand .mk { width: 34px; height: 34px; border-radius: 7px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: #fff; }
  .panel .brand .nm { font-weight: 700; font-size: 18px; letter-spacing: 0.02em; }
  .panel .qwrap { display: flex; flex-direction: column; gap: 14px; }
  .panel .num { font-family: var(--font-mono); font-size: 110px; font-weight: 800; line-height: 0.9; color: var(--accent); letter-spacing: -0.03em; }
  .panel .qsub { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 0.1em; }
  .panel .foot { font-family: var(--font-mono); font-size: 13px; color: rgba(255,255,255,0.55); letter-spacing: 0.06em; }
  .main { flex: 1; padding: 64px 72px; display: flex; flex-direction: column; justify-content: center; position: relative; }
  .kicker { font-family: var(--font-mono); font-size: 15px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 28px; }
  h1 { font-size: 50px; font-weight: 800; color: var(--heading); line-height: 1.16; letter-spacing: -0.02em; max-width: 640px; }
  .dek { margin-top: 28px; font-size: 19px; color: var(--gray-2); line-height: 1.6; max-width: 600px; }
  .rule { width: 64px; height: 4px; background: var(--accent); margin-top: 36px; }
  .meta { position: absolute; bottom: 56px; left: 72px; display: flex; gap: 56px; }
  .meta .k { font-family: var(--font-mono); font-size: 12px; color: var(--gray-3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .meta .v { font-size: 16px; font-weight: 600; color: var(--heading); }
</style>
</head>
<body data-layout="cover" data-screen-label="modern · cover">
  <div class="panel">
    <div class="brand"><div class="mk">M</div><div class="nm">MEMORY DIV.</div></div>
    <div class="qwrap"><div class="num">Q2</div><div class="qsub">FY26 QUARTERLY REVIEW</div></div>
    <div class="foot">// CONFIDENTIAL · INTERNAL ONLY</div>
  </div>
  <div class="main">
    <div class="kicker">// FP&amp;A · 분기 사업 리뷰</div>
    <h1>HBM 주도 성장, 분기 매출 사상 최대 경신</h1>
    <div class="dek">메모리 사업부 FY26 2분기 실적과 차세대 HBM 로드맵, 제품군별 손익 구조를 한 장에 정리한 경영진 리뷰 자료입니다.</div>
    <div class="rule"></div>
    <div class="meta">
      <div><div class="k">발표</div><div class="v">전략기획실</div></div>
      <div><div class="k">기준</div><div class="v">FY26.Q2 마감</div></div>
      <div><div class="k">일자</div><div class="v">2026.06</div></div>
    </div>
  </div>
</body>
</html>
