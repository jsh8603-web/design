<!doctype html>
<html lang="ko" data-theme="company">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--theme-text); font-family: var(--font-sans); overflow: hidden; position: relative; }
  .slide { width: 1280px; height: 720px; padding: 64px 72px; position: relative; display: flex; flex-direction: column; }
  .bar { position: absolute; left: 0; top: 0; width: 10px; height: 720px; background: var(--accent); }
  .kicker { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
  .title { font-size: 38px; font-weight: 800; color: var(--primary); line-height: 1.12; letter-spacing: -0.01em; margin-bottom: 56px; }
  .flow { display: flex; align-items: flex-start; justify-content: space-between; position: relative; }
  .node { width: 188px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; z-index: 2; }
  .circle { width: 72px; height: 72px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; margin-bottom: 18px; }
  .node.hot .circle { background: var(--accent); }
  .step-label { font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
  .step-desc { font-size: 13px; font-weight: 500; color: var(--gray-2); line-height: 1.42; }
  .connector { position: absolute; top: 36px; height: 3px; background: var(--gray-3); z-index: 1; }
  .connector .head { position: absolute; right: -3px; top: -4px; width: 11px; height: 11px; background: var(--gray-3); border-radius: 2px; transform: rotate(45deg); }
  .legend { margin-top: 64px; display: flex; gap: 16px; align-items: center; }
  .legend .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); }
  .legend .txt { font-size: 14px; font-weight: 600; color: var(--gray-2); }
</style>
</head>
<body>
<div class="slide">
  <div class="bar"></div>
  <div class="kicker">신제품 출시 프로세스</div>
  <div class="title">아이디어에서 양산까지, 5단계 게이트로<br>출시 리스크를 단계별 검증</div>
  <div class="flow">
    <div class="connector" style="left:118px; width:158px;"><div class="head"></div></div>
    <div class="connector" style="left:382px; width:158px;"><div class="head"></div></div>
    <div class="connector" style="left:646px; width:158px;"><div class="head"></div></div>
    <div class="connector" style="left:910px; width:158px;"><div class="head"></div></div>
    <div class="node">
      <div class="circle">1</div>
      <div class="step-label">발굴</div>
      <div class="step-desc">시장 수요 스캔 및 기술 타당성 1차 평가</div>
    </div>
    <div class="node">
      <div class="circle">2</div>
      <div class="step-label">설계</div>
      <div class="step-desc">아키텍처 확정 및 핵심 IP 검증, BOM 산정</div>
    </div>
    <div class="node hot">
      <div class="circle">3</div>
      <div class="step-label">시제품</div>
      <div class="step-desc">프로토타입 제작 후 신뢰성·수율 테스트 집중</div>
    </div>
    <div class="node">
      <div class="circle">4</div>
      <div class="step-label">파일럿</div>
      <div class="step-desc">소량 양산으로 공정 안정화 및 고객 샘플 출하</div>
    </div>
    <div class="node">
      <div class="circle">5</div>
      <div class="step-label">양산</div>
      <div class="step-desc">풀 캐파 가동 및 품질 모니터링 체계 전환</div>
    </div>
  </div>
  <div class="legend"><div class="dot"></div><div class="txt">3단계 시제품 게이트 = 최대 의사결정 분기점 (수율 75% 미달 시 재설계)</div></div>
</div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
</body>
</html>
