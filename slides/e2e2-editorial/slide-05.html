<!DOCTYPE html>
<html lang="ko" data-theme="editorial"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  body { background:var(--theme-bg); padding:48px 64px; color:var(--primary); display:flex; flex-direction:column; }
  .kicker { font-size:16px; font-weight:600; color:var(--accent); letter-spacing:0.14em; text-transform:uppercase; }
  h1 { font-size:36px; font-weight:500; color:var(--primary); letter-spacing:-0.02em; line-height:1.1; margin-top:8px; }
  h1 em { font-style:italic; color:var(--accent); font-weight:400; }
  .grid { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:20px; margin-top:26px; flex:1; }
  .tile { position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; }
  .tile.ph { background:var(--gray-2); }
  .tile.ph2 { background:var(--surface-inverse); }
  .tile.light { background:var(--theme-bg-alt); border:1px solid var(--rule-soft, #D8D2C9); }
  .ph-mark { position:absolute; top:14px; left:16px; font-size:12px; font-weight:700; letter-spacing:0.1em; color:rgba(255,255,255,0.65); text-transform:uppercase; }
  .tile.light .ph-mark { color:var(--gray-3); }
  .overlay { position:relative; background:rgba(45,42,38,0.78); padding:14px 18px; }
  .overlay .cap-t { font-size:17px; font-weight:600; color:#FFFFFF; line-height:1.25; }
  .overlay .cap-s { font-size:13px; color:#D8D2C9; padding-top:3px; }
  .below { padding:12px 4px 0; }
  .below .cap-t { font-size:16px; font-weight:600; color:var(--primary); line-height:1.25; }
  .below .cap-s { font-size:13px; color:var(--gray-2); padding-top:3px; }
</style><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1280px; height:720px; overflow:hidden; font-family:'Pretendard', -apple-system, sans-serif; position:relative; }
.serif { font-family: 'Newsreader', 'Times New Roman', serif; font-feature-settings: 'lnum'; }
</style></head><body data-layout="image-grid" data-screen-label="e2e2-editorial · imagegrid">
<div class="kicker">팹 투어 · 현장 기록</div>
<h1 class="serif">생산 현장의 <em>네 장면</em></h1>
<div class="grid">
  <div class="tile ph">
    <div class="ph-mark">Image · clean room</div>
    <div class="overlay">
      <div class="cap-t">클린룸 EUV 노광 베이</div>
      <div class="cap-s">먼지 한 톨이 수율을 가른다 — 클래스 1 환경</div>
    </div>
  </div>
  <div class="tile ph2">
    <div class="ph-mark">Image · wafer</div>
    <div class="overlay">
      <div class="cap-t">300mm 웨이퍼 검사 라인</div>
      <div class="cap-s">전수 광학 검사로 결함을 조기에 잡는다</div>
    </div>
  </div>
  <div class="tile light">
    <div class="ph-mark">Image · bonding</div>
    <div class="below">
      <div class="cap-t">HBM TSV 본딩 공정</div>
      <div class="cap-s">12단 적층 — 워피지 보정이 핵심</div>
    </div>
  </div>
  <div class="tile light">
    <div class="ph-mark">Image · packaging</div>
    <div class="below">
      <div class="cap-t">어드밴스드 패키징 후공정</div>
      <div class="cap-s">칩렛 결합으로 성능 밀도를 끌어올린다</div>
    </div>
  </div>
</div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
</body></html>
