<!doctype html>
<html lang="ko" data-theme="modern">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--gray-1); font-family: var(--font-sans); overflow: hidden; position: relative; display: flex; }
  .side { width: 92px; background: var(--surface-inverse); flex-shrink: 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 60px; }
  .side .mark { font-family: var(--font-serif); font-size: 120px; font-weight: 800; color: var(--accent); line-height: 0.7; }
  .main { flex: 1; padding: 60px 80px; display: flex; flex-direction: column; }
  .kicker { font-family: var(--font-mono); font-size: 14px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 28px; }
  .hero-q { font-family: var(--font-serif); font-size: 46px; font-weight: 700; color: var(--heading); line-height: 1.32; letter-spacing: -0.015em; max-width: 980px; }
  .hero-q .em { color: var(--accent); }
  .attr { display: flex; align-items: center; gap: 18px; margin-top: 36px; }
  .avatar { width: 62px; height: 62px; border-radius: 50%; background: var(--gray-4); border: 2px solid var(--gray-3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: var(--gray-2); }
  .attr .who .nm { font-size: 18px; font-weight: 800; color: var(--gray-1); }
  .attr .who .ro { font-size: 14px; font-weight: 500; color: var(--gray-2); margin-top: 3px; }
  .div { height: 1px; background: var(--gray-4); margin: 40px 0 34px; }
  .second { display: flex; align-items: flex-start; gap: 20px; }
  .second .avatar { width: 52px; height: 52px; font-size: 18px; }
  .second .q { font-family: var(--font-serif); font-size: 22px; font-weight: 500; color: var(--gray-1); line-height: 1.5; font-style: italic; max-width: 820px; }
  .second .sig { font-size: 13px; font-weight: 700; color: var(--gray-2); margin-top: 10px; font-style: normal; }
</style>
</head>
<body data-layout="pull_quote" data-screen-label="modern · quote">
  <div class="side"><div class="mark">&ldquo;</div></div>
  <div class="main">
    <div class="kicker">// 고객 추천사 · 파트너 보이스</div>
    <div class="hero-q">납기 지연 한 번 없이 <span class="em">12단 HBM 양산</span>을 함께 끌어올린 파트너입니다. 수율 데이터를 투명하게 공유해 준 덕에 우리 제품 출시 일정을 자신 있게 앞당길 수 있었습니다.</div>
    <div class="attr">
      <div class="avatar">K</div>
      <div class="who">
        <div class="nm">김도현 부사장</div>
        <div class="ro">글로벌 AI 가속기 기업 · 공급망 총괄</div>
      </div>
    </div>
    <div class="div"></div>
    <div class="second">
      <div class="avatar">L</div>
      <div>
        <div class="q">&ldquo;선단 공정 전환 과정에서 가장 든든했던 협력사. 기술 난제를 함께 풀어가는 자세가 인상적이었습니다.&rdquo;</div>
        <div class="sig">— 이서연, 팹리스 스타트업 CTO</div>
      </div>
    </div>
  </div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
</body>
</html>
