<!doctype html>
<html lang="ko" data-theme="classic">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--gray-1); font-family: var(--font-sans); overflow: hidden; position: relative; }
  .head { padding: 48px 72px 0; }
  .kicker { font-family: var(--font-mono); font-size: 14px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 12px; }
  h1 { font-size: 30px; font-weight: 800; color: var(--primary); line-height: 1.2; letter-spacing: -0.02em; max-width: 1050px; }
  .rule { width: 56px; height: 4px; background: var(--accent); margin-top: 14px; }

  .wrap { display: grid; grid-template-columns: 660px 1fr; gap: 48px; padding: 34px 72px 0; }
  .funnel { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  /* trapezoid segments via clip-path; converter must treat as bbox — COM verify */
  .seg { height: 78px; display: flex; align-items: center; justify-content: center; color: #FFFFFF; }
  .s1 { width: 640px; background: var(--primary);  clip-path: polygon(0 0, 100% 0, 86% 100%, 14% 100%); }
  .s2 { width: 552px; background: #0B3B5C;          clip-path: polygon(0 0, 100% 0, 84% 100%, 16% 100%); }
  .s3 { width: 464px; background: #0E6FA0;          clip-path: polygon(0 0, 100% 0, 82% 100%, 18% 100%); }
  .s4 { width: 376px; background: var(--accent);     clip-path: polygon(0 0, 100% 0, 78% 100%, 22% 100%); }
  .seg .st { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; padding-right: 14px; }
  .seg .sv { font-size: 18px; font-weight: 800; }

  .legend { padding-top: 6px; }
  .lg-row { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1.5px solid var(--gray-4); }
  .lg-row .dot { width: 12px; height: 12px; flex-shrink: 0; margin-top: 4px; }
  .d1 { background: var(--primary); } .d2 { background: #0E6FA0; } .d3 { background: var(--accent); } .d4 { background: var(--positive); }
  .lg-row .ltx .lt { font-size: 15px; font-weight: 700; color: var(--gray-1); }
  .lg-row .ltx .ls { font-size: 13px; font-weight: 500; color: var(--gray-2); margin-top: 3px; line-height: 1.4; }
</style>
</head>
<body data-layout="funnel" data-screen-label="classic · funnel">
  <div class="head">
    <div class="kicker">// 파이프라인 · 영업 전환 퍼널</div>
    <h1>리드에서 계약까지, 단계별 전환율로 병목은 검증 단계에 집중</h1>
    <div class="rule"></div>
  </div>
  <div class="wrap">
    <div class="funnel">
      <div class="seg s1"><span class="st">리드 확보</span><span class="sv">1,200건</span></div>
      <div class="seg s2"><span class="st">기술 검증(PoC)</span><span class="sv">540건</span></div>
      <div class="seg s3"><span class="st">계약 협상</span><span class="sv">210건</span></div>
      <div class="seg s4"><span class="st">수주 확정</span><span class="sv">96건</span></div>
    </div>
    <div class="legend">
      <div class="lg-row"><div class="dot d1"></div><div class="ltx"><div class="lt">리드 &rarr; PoC · 45%</div><div class="ls">초기 적격성 필터가 안정적으로 작동.</div></div></div>
      <div class="lg-row"><div class="dot d2"></div><div class="ltx"><div class="lt">PoC &rarr; 협상 · 39%</div><div class="ls">검증 기간 장기화가 최대 병목.</div></div></div>
      <div class="lg-row"><div class="dot d3"></div><div class="ltx"><div class="lt">협상 &rarr; 수주 · 46%</div><div class="ls">가격보다 캐파 보장이 결정 변수.</div></div></div>
      <div class="lg-row"><div class="dot d4"></div><div class="ltx"><div class="lt">전체 전환 · 8.0%</div><div class="ls">목표 7% 대비 +1.0%p 초과 달성.</div></div></div>
    </div>
  </div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
</body>
</html>
