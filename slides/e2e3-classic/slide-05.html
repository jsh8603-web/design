<!doctype html>
<html lang="ko" data-theme="classic">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--gray-1); font-family: var(--font-sans); overflow: hidden; position: relative; }
  .head { padding: 48px 72px 0; }
  .kicker { font-family: var(--font-mono); font-size: 14px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 12px; }
  h1 { font-size: 30px; font-weight: 800; color: var(--primary); line-height: 1.2; letter-spacing: -0.02em; max-width: 1050px; }
  .rule { width: 56px; height: 4px; background: var(--accent); margin-top: 14px; }

  .board { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; padding: 32px 72px 0; }
  .col { background: var(--gray-4); padding: 14px 14px 18px; }
  .col-hd { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 2px solid var(--gray-3); margin-bottom: 14px; }
  .col-hd .ct { font-size: 15px; font-weight: 800; color: var(--primary); letter-spacing: 0.02em; }
  .count { background: var(--primary); color: #FFFFFF; font-size: 13px; font-weight: 800; padding: 2px 11px; }
  .col.done .count { background: var(--positive); }
  .col.prog .count { background: var(--accent); }

  .card { background: var(--theme-bg); border-left: 4px solid var(--gray-3); padding: 12px 14px; margin-bottom: 12px; }
  .card.acc { border-left: 4px solid var(--accent); }
  .card.pos { border-left: 4px solid var(--positive); }
  .card .ctt { font-size: 15px; font-weight: 700; color: var(--gray-1); line-height: 1.3; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .tags { display: flex; align-items: center; gap: 8px; }
  .tag { font-size: 11px; font-weight: 700; padding: 3px 9px; background: var(--gray-2); color: #FFFFFF; letter-spacing: 0.02em; }
  .tag.hi { background: var(--primary); color: #FFFFFF; }
  .owner { font-size: 12px; font-weight: 600; color: var(--gray-2); }
</style>
</head>
<body data-layout="comparison_table" data-screen-label="classic · kanban">
  <div class="head">
    <div class="kicker">// 스프린트 26 · 실행 보드</div>
    <h1>증설 스프린트 진행 현황, 완료 4건으로 일정 대비 선행 중</h1>
    <div class="rule"></div>
  </div>
  <div class="board">
    <div class="col todo">
      <div class="col-hd"><div class="ct">To Do</div><div class="count">3</div></div>
      <div class="card"><div class="ctt">HBM4 베이스다이 검증 착수</div><div class="card-meta"><div class="tags"><div class="tag hi">P0</div><div class="tag">R&amp;D</div></div><span class="owner">이도현</span></div></div>
      <div class="card"><div class="ctt">신규 검사장비 발주 승인</div><div class="card-meta"><div class="tags"><div class="tag">구매</div></div><span class="owner">정유진</span></div></div>
      <div class="card"><div class="ctt">소재 국산화 2차 후보 선정</div><div class="card-meta"><div class="tags"><div class="tag">원가</div></div><span class="owner">박지우</span></div></div>
    </div>
    <div class="col prog">
      <div class="col-hd"><div class="ct">진행 중</div><div class="count">2</div></div>
      <div class="card acc"><div class="ctt">P3 라인 풀가동 전환</div><div class="card-meta"><div class="tags"><div class="tag hi">P0</div><div class="tag">양산</div></div><span class="owner">박지우</span></div></div>
      <div class="card acc"><div class="ctt">TSV 식각 결함률 모니터링</div><div class="card-meta"><div class="tags"><div class="tag">수율</div></div><span class="owner">박지우</span></div></div>
    </div>
    <div class="col done">
      <div class="col-hd"><div class="ct">완료</div><div class="count">4</div></div>
      <div class="card pos"><div class="ctt">GPU 고객 LTA 체결</div><div class="card-meta"><div class="tags"><div class="tag">영업</div></div><span class="owner">이도현</span></div></div>
      <div class="card pos"><div class="ctt">P3 캐파 4만장 확보</div><div class="card-meta"><div class="tags"><div class="tag">양산</div></div><span class="owner">정유진</span></div></div>
      <div class="card pos"><div class="ctt">단가 9% 절감 목표 달성</div><div class="card-meta"><div class="tags"><div class="tag">원가</div></div><span class="owner">박지우</span></div></div>
    </div>
  </div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
</body>
</html>
