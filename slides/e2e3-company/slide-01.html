<!doctype html>
<html lang="ko" data-theme="company">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--theme-text); font-family: var(--font-sans); overflow: hidden; position: relative; }
  .slide { width: 1280px; height: 720px; padding: 60px 80px; position: relative; display: flex; flex-direction: column; }
  .bar { position: absolute; left: 0; top: 0; width: 10px; height: 720px; background: var(--accent); }
  .kicker { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
  .title { font-size: 36px; font-weight: 800; color: var(--primary); line-height: 1.12; letter-spacing: -0.01em; margin-bottom: 44px; }
  .stats { display: flex; gap: 32px; flex: 1; align-items: stretch; }
  .stat { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
  .stat-rule { width: 56px; height: 5px; background: var(--accent); margin-bottom: 22px; }
  .num { font-size: 92px; font-weight: 800; color: var(--primary); line-height: 0.95; letter-spacing: -0.03em; white-space: nowrap; }
  .num small { font-size: 30px; font-weight: 700; color: var(--accent); letter-spacing: 0; padding-left: 4px; }
  .label { font-size: 21px; font-weight: 800; color: var(--gray-1); margin-top: 18px; line-height: 1.2; }
  .desc { font-size: 15px; font-weight: 500; color: var(--gray-2); margin-top: 10px; line-height: 1.4; }
  .feature .num { font-size: 104px; }
  .feature .num small { font-size: 34px; }
</style>
</head>
<body>
<div class="slide">
  <div class="bar"></div>
  <div class="kicker">FY2026 상반기 실적 하이라이트</div>
  <div class="title">상반기 매출 사상 최대, 영업이익률<br>두 자릿수 회복으로 체질 개선 입증</div>
  <div class="stats">
    <div class="stat feature">
      <div class="stat-rule"></div>
      <div class="num">8.4<small>조원</small></div>
      <div class="label">상반기 누적 매출</div>
      <div class="desc">전년 동기 7.1조 대비 +18.3%</div>
    </div>
    <div class="stat">
      <div class="stat-rule"></div>
      <div class="num">12.6<small>%</small></div>
      <div class="label">영업이익률</div>
      <div class="desc">고부가 제품 믹스 확대로 전년 +4.2%p 개선</div>
    </div>
    <div class="stat">
      <div class="stat-rule"></div>
      <div class="num">2.3<small>×</small></div>
      <div class="label">AI 부문 성장 배수</div>
      <div class="desc">데이터센터 수요 견인, 전년 동기 매출 대비 2.3배</div>
    </div>
    <div class="stat">
      <div class="stat-rule"></div>
      <div class="num">94<small>%</small></div>
      <div class="label">핵심 라인 가동률</div>
      <div class="desc">증설 캐파 조기 안정화로 공급 차질 최소화</div>
    </div>
  </div>
</div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
</body>
</html>
