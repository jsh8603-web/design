<!DOCTYPE html>
<html lang="ko" data-theme="dark-mono"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../design-system/colors_and_type.css"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1280px; height:720px; overflow:hidden;
  font-family:'Pretendard', -apple-system, sans-serif;
  background:var(--theme-bg); color:var(--theme-text);
  padding:56px 72px; position:relative;
  display:flex; flex-direction:column;
}
.bar { position:absolute; left:0; top:0; width:8px; height:720px; background:var(--accent); }
.kicker { font-family:'JetBrains Mono', monospace; font-size:14px; color:var(--accent);
  letter-spacing:0.12em; margin-bottom:12px; }
h1 { font-size:32px; font-weight:700; color:var(--heading); line-height:1.15;
  letter-spacing:-0.01em; margin-bottom:26px; }
h1 em { font-style:normal; color:var(--accent); }
.grid { flex:1; min-height:0; display:grid;
  grid-template-columns:1.6fr 1fr 1fr 1fr 1fr;
  grid-auto-rows:1fr;
  gap:1px; background:var(--gray-3); border:1px solid var(--gray-3); border-radius:12px;
  overflow:hidden; }
.cell { background:var(--theme-bg); display:flex; align-items:center;
  padding:0 18px; font-size:14px; color:var(--gray-1); }
.cell.head { background:var(--gray-4); font-weight:700; font-size:15px; justify-content:center;
  color:var(--gray-1); }
.cell.head.pro { background:var(--accent); color:#0F1419; }
.cell.feat { font-weight:600; color:var(--gray-1); }
.cell.center { justify-content:center; }
.glyph { font-size:20px; font-weight:800; line-height:1; }
.yes { color:var(--positive); }
.no { color:var(--negative); }
.partial { color:var(--gray-2); font-weight:700; }
.cell.center small { display:block; font-size:11px; color:var(--gray-2); margin-top:3px; }
.head .sub { font-size:11px; font-weight:600; margin-top:2px; }
.headcell { flex-direction:column; }
</style></head><body data-layout="harvey_ball_table" data-screen-label="04-dark-mono · icon-compare">
