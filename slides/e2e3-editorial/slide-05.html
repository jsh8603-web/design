<!DOCTYPE html>
<html lang="ko" data-theme="editorial"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  body { background:var(--theme-bg); padding:48px 64px; color:var(--primary); display:flex; flex-direction:column; }
  .kicker { font-size:16px; font-weight:600; color:var(--accent); letter-spacing:0.14em; text-transform:uppercase; }
  h1 { font-size:34px; font-weight:500; color:var(--primary); letter-spacing:-0.02em; line-height:1.1; margin-top:6px; }
  h1 em { font-style:italic; color:var(--accent); font-weight:400; }
  .rule { height:1px; background:var(--rule-soft, #D8D2C9); margin:16px 0 22px; }
  .board { flex:1; display:grid; grid-template-columns:repeat(3, 1fr); gap:24px; }
  .col { display:flex; flex-direction:column; gap:12px; }
  .colhd { display:flex; align-items:center; justify-content:space-between; padding-bottom:10px; border-bottom:2px solid var(--rule-soft, #D8D2C9); }
  .colhd .ct { font-size:16px; font-weight:700; color:var(--primary); letter-spacing:0.02em; }
  .count { display:inline-flex; align-items:center; justify-content:center; min-width:26px; font-size:13px; font-weight:700; color:var(--surface-inverse-fg); background:var(--accent); padding:3px 10px; }
  .col.done .count { background:var(--positive); }
  .col.prog .count { background:var(--surface-inverse); }
  .card { background:var(--theme-bg-card); border:1px solid var(--rule-soft, #D8D2C9); border-left:3px solid var(--accent); padding:12px 14px; }
  .col.done .card { border-left-color:var(--positive); }
  .col.prog .card { border-left-color:var(--primary); }
  .card .tt { font-size:14.5px; font-weight:700; color:var(--primary); line-height:1.25; }
  .meta { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
  .tag { display:inline-flex; align-items:center; white-space:nowrap; font-size:11px; font-weight:700; color:var(--accent); background:var(--theme-bg-alt); padding:3px 9px; letter-spacing:0.03em; }
  .meta .who { white-space:nowrap; }
  .col.done .tag { color:var(--positive); }
  .col.prog .tag { color:var(--gray-1); }
  .who { font-size:12px; font-weight:600; color:var(--gray-2); }
</style><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1280px; height:720px; overflow:hidden; font-family:'Pretendard', -apple-system, sans-serif; position:relative; }
.serif { font-family: 'Newsreader', 'Times New Roman', serif; font-feature-settings: 'lnum'; }
</style></head><body data-layout="kanban" data-screen-label="e2e3-editorial · kanban">
<div class="kicker">스프린트 24 · 작업 보드</div>
<h1 class="serif">남은 두 카드가 <em>이번 릴리스</em>의 마지막 관문</h1>
<div class="rule"></div>
<div class="board">
  <div class="col todo">
    <div class="colhd"><div class="ct">예정 (To Do)</div><div class="count">3</div></div>
    <div class="card">
      <div class="tt">결제 실패 재시도 로직 설계</div>
      <div class="meta"><div class="tag">백엔드</div><div class="who">김도현</div></div>
    </div>
    <div class="card">
      <div class="tt">온보딩 투어 카피 리라이트</div>
      <div class="meta"><div class="tag">콘텐츠</div><div class="who">이서연</div></div>
    </div>
    <div class="card">
      <div class="tt">접근성 대비 일괄 점검</div>
      <div class="meta"><div class="tag">디자인</div><div class="who">박준호</div></div>
    </div>
  </div>
  <div class="col prog">
    <div class="colhd"><div class="ct">진행 중 (Doing)</div><div class="count">2</div></div>
    <div class="card">
      <div class="tt">대시보드 위젯 가상 스크롤 적용</div>
      <div class="meta"><div class="tag">프론트엔드</div><div class="who">최유진</div></div>
    </div>
    <div class="card">
      <div class="tt">감사 로그 스키마 마이그레이션</div>
      <div class="meta"><div class="tag">인프라</div><div class="who">정민석</div></div>
    </div>
  </div>
  <div class="col done">
    <div class="colhd"><div class="ct">완료 (Done)</div><div class="count">3</div></div>
    <div class="card">
      <div class="tt">SSO 연동 QA 사인오프</div>
      <div class="meta"><div class="tag">QA</div><div class="who">한지우</div></div>
    </div>
    <div class="card">
      <div class="tt">요금제 비교 페이지 배포</div>
      <div class="meta"><div class="tag">프론트엔드</div><div class="who">최유진</div></div>
    </div>
    <div class="card">
      <div class="tt">API 응답 캐싱 계층 도입</div>
      <div class="meta"><div class="tag">백엔드</div><div class="who">김도현</div></div>
    </div>
  </div>
</div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
</body></html>
