<!DOCTYPE html>
<html lang="ko" data-theme="executive-editorial"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../design-system/colors_and_type.css"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1280px; height:720px; overflow:hidden; position:relative;
  font-family:'Pretendard', -apple-system, sans-serif;
  background:var(--theme-bg); color:var(--primary);
  padding:52px 56px;
  display:flex; flex-direction:column;
}
.head { display:flex; align-items:flex-end; justify-content:space-between; border-bottom:1.5px solid var(--primary); padding-bottom:18px; margin-bottom:34px; }
.eyebrow { font-size:15px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--gray-2); }
.eyebrow .dot { color:var(--accent); }
h1 { font-size:34px; font-weight:600; letter-spacing:-0.01em; color:var(--primary); line-height:1.18; margin-top:8px; }
h1 em { font-style:normal; color:var(--accent); }
.docid { font-family:'JetBrains Mono', monospace; font-size:15px; color:var(--gray-3); }

.stats { display:grid; grid-template-columns:1.25fr 1fr 1fr; gap:0; flex:1; }
.stat { padding:18px 30px; display:flex; flex-direction:column; justify-content:center; border-left:1.5px solid var(--border-soft); min-width:0; }
.stat:first-child { border-left:none; padding-left:0; }
.stat .kicker { font-size:13px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
.stat .num { font-size:118px; font-weight:800; line-height:0.92; letter-spacing:-0.04em; color:var(--primary); }
.stat .num small { font-size:46px; font-weight:700; letter-spacing:-0.01em; color:var(--accent); padding-left:4px; }
.stat.lead .num { font-size:138px; }
.stat.lead .num small { font-size:52px; }
.stat .label { font-size:18px; font-weight:700; color:var(--primary); margin-top:20px; line-height:1.25; }
.stat .desc { font-size:14px; font-weight:400; color:var(--gray-2); margin-top:8px; line-height:1.45; }
.stat .delta { display:inline-block; font-family:'JetBrains Mono', monospace; font-size:14px; font-weight:700; color:var(--positive); margin-top:12px; }
.stat .delta.neg { color:var(--negative); }
</style></head><body data-layout="stat-hero" data-screen-label="01-executive · stat-hero">

  <div class="head">
    <div>
      <div class="eyebrow"><span class="dot">●</span> Q2 실적 브리프 · 데이터센터 부문</div>
      <h1>한 분기 만에 <em>규모의 변곡점</em>을 넘었다</h1>
    </div>
    <div class="docid">IR-2026-Q2 / p.03</div>
  </div>

  <div class="stats">
    <div class="stat lead">
      <div class="kicker">연환산 매출</div>
      <div class="num">2.4<small>B$</small></div>
      <div class="label">데이터센터 매출 런레이트</div>
      <div class="desc">단일 분기 기준 사상 최대. 신규 캐파 가동이 매출에 처음 온전히 반영됐다.</div>
      <span class="delta">▲ 41% YoY</span>
    </div>
    <div class="stat">
      <div class="kicker">영업이익률</div>
      <div class="num">28<small>%</small></div>
      <div class="label">조정 영업이익률</div>
      <div class="desc">전력·냉각 단가 안정으로 직전 분기 대비 4.2%p 개선.</div>
      <span class="delta">▲ 4.2%p QoQ</span>
    </div>
    <div class="stat">
      <div class="kicker">캐파 효율</div>
      <div class="num">1.6<small>×</small></div>
      <div class="label">전력 효율 (PUE 역산)</div>
      <div class="desc">액침냉각 1개 라인 전환 효과. 잔여 라인 전환 시 추가 개선 여지.</div>
      <span class="delta neg">▼ 0.3 목표 미달</span>
    </div>
  </div>

<style id="om-fit-scaler-style">html { overflow:hidden !important; background:#0a0a0a; }</style>
<script id="om-fit-scaler">
(function(){function fit(){var s=Math.min(window.innerWidth/1280,window.innerHeight/720);var b=document.body;b.style.width='1280px';b.style.height='720px';b.style.position='absolute';b.style.transformOrigin='top left';b.style.left=((window.innerWidth-1280*s)/2)+'px';b.style.top=((window.innerHeight-720*s)/2)+'px';b.style.transform='scale('+s+')';}window.addEventListener('resize',fit,{passive:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',fit);fit();})();
</script>
</body></html>
