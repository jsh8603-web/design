<!DOCTYPE html>
<html lang="ko" data-theme="executive-editorial"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../design-system/colors_and_type.css"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1280px; height:720px; overflow:hidden; position:relative;
  font-family:'Pretendard', -apple-system, sans-serif;
  background:var(--theme-bg); color:var(--primary);
  padding:52px 56px;
  display:flex; flex-direction:column;
}
.head { display:flex; align-items:flex-end; justify-content:space-between; border-bottom:1.5px solid var(--primary); padding-bottom:18px; margin-bottom:28px; }
.eyebrow { font-size:15px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--gray-2); }
.eyebrow .dot { color:var(--accent); }
h1 { font-size:34px; font-weight:600; letter-spacing:-0.01em; color:var(--primary); line-height:1.18; margin-top:8px; }
h1 em { font-style:normal; color:var(--accent); }
.docid { font-family:'JetBrains Mono', monospace; font-size:15px; color:var(--gray-3); }

.tree { flex:1; position:relative; }
/* 박스 */
.node { position:absolute; background:var(--theme-bg-card); border:1.5px solid var(--primary); padding:14px 18px; width:222px; }
.node.root { border-width:2px; background:var(--surface-inverse); }
.node.root .nt { color:var(--surface-inverse-fg); }
.node.root .ns { color:var(--gray-4); }
.node .nt { font-size:18px; font-weight:700; color:var(--primary); line-height:1.2; }
.node .ns { font-size:13px; font-weight:400; color:var(--gray-2); margin-top:5px; line-height:1.35; }
.node .nb { display:inline-block; font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:700; letter-spacing:0.08em; color:var(--accent); margin-bottom:6px; }
.node.l2 { border-color:var(--accent); }
.node.l2 .nb { color:var(--accent); }
.node.l3 { width:208px; padding:12px 16px; border-color:var(--border-soft); }
.node.l3 .nt { font-size:15px; }
.node.l3 .nb { color:#B34D00; }
/* 연결선 = 실 div */
.line { position:absolute; background:var(--gray-3); }
.line.v { width:1.5px; }
.line.h { height:1.5px; }
</style></head><body data-layout="org-tree" data-screen-label="02-executive · org-chart">
