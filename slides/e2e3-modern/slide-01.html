<!doctype html>
<html lang="ko" data-theme="modern">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--gray-1); font-family: var(--font-sans); overflow: hidden; position: relative; }
  .head { padding: 56px 72px 0; }
  .kicker { font-family: var(--font-mono); font-size: 14px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 14px; }
  h1 { font-size: 34px; font-weight: 800; color: var(--heading); line-height: 1.2; letter-spacing: -0.02em; max-width: 1080px; }
  .rule { width: 56px; height: 4px; background: var(--accent); margin-top: 18px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; padding: 56px 72px 40px; }
  .stat { border-top: 4px solid var(--gray-4); padding-top: 22px; }
  .stat.hero { border-top-color: var(--accent); }
  .num { font-size: 96px; font-weight: 800; color: var(--gray-1); line-height: 0.95; letter-spacing: -0.04em; }
  .stat.hero .num { color: var(--accent); }
  .num small { font-size: 38px; font-weight: 700; letter-spacing: -0.02em; color: var(--gray-2); }
  .stat.hero .num small { color: var(--accent); }
  .lbl { font-size: 17px; font-weight: 700; color: var(--gray-1); margin-top: 18px; line-height: 1.3; }
  .desc { font-size: 13px; font-weight: 500; color: var(--gray-2); margin-top: 8px; line-height: 1.45; }
  .foot { position: absolute; bottom: 34px; left: 72px; font-size: 13px; color: var(--gray-3); font-weight: 500; }
</style>
</head>
<body data-layout="big_number" data-screen-label="modern · stat-hero">
  <div class="head">
    <div class="kicker">// FY26 상반기 · 핵심 지표 스냅샷</div>
    <h1>매출·수익성·수주가 동반 개선되며 하반기 성장 발판 마련</h1>
    <div class="rule"></div>
  </div>
  <div class="stats">
    <div class="stat hero">
      <div class="num">42.8<small>%</small></div>
      <div class="lbl">영업이익률</div>
      <div class="desc">전년 동기 31.5%에서 11.3%p 개선, 분기 사상 최고치</div>
    </div>
    <div class="stat">
      <div class="num">3.6<small>B$</small></div>
      <div class="lbl">상반기 매출</div>
      <div class="desc">HBM 비중 확대로 전년 대비 +28% 성장</div>
    </div>
    <div class="stat">
      <div class="num">2.4<small>×</small></div>
      <div class="lbl">수주잔고 배수</div>
      <div class="desc">연간 매출 대비 잔고, 12개월 가시성 확보</div>
    </div>
    <div class="stat">
      <div class="num">118<small>일</small></div>
      <div class="lbl">현금전환주기</div>
      <div class="desc">재고 회전 개선으로 전년比 22일 단축</div>
    </div>
  </div>
  <div class="foot">출처 — FY26 상반기 결산 (잠정), 내부 관리회계 기준</div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
</body>
</html>
