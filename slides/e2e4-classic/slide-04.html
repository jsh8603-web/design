<!doctype html>
<html lang="ko" data-theme="classic">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: var(--theme-bg); color: var(--gray-1); font-family: var(--font-sans); overflow: hidden; position: relative; }
  .head { padding: 48px 72px 0; }
  .kicker { font-family: var(--font-mono); font-size: 14px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 12px; }
  h1 { font-size: 30px; font-weight: 800; color: var(--primary); line-height: 1.2; letter-spacing: -0.02em; max-width: 1080px; }
  .rule { width: 56px; height: 4px; background: var(--accent); margin-top: 14px; }

  .wf { padding: 36px 72px 0; }
  /* plot: fixed-height band, columns floated by transparent spacer div (real div, no absolute overlay) */
  .plot { display: grid; grid-template-columns: repeat(6, 1fr); gap: 36px; height: 380px; align-items: end; }
  .col { display: flex; flex-direction: column; justify-content: flex-end; height: 100%; position: relative; }
  .spacer { width: 100%; }            /* transparent float — no fill */
  /* every bar carries its value text INSIDE (no empty filled cell) */
  .seg { width: 100%; display: flex; align-items: center; justify-content: center; }
  .seg .sv { font-size: 15px; font-weight: 800; color: #FFFFFF; line-height: 1; }
  .b-base { background: var(--primary); }
  .b-end  { background: #0B3B5C; }
  .b-up   { background: var(--positive); }
  .b-down { background: var(--negative); }
  /* connector: real thin div bridging running total between adjacent bars */
  .conn { position: absolute; height: 2px; background: var(--gray-3); right: -36px; width: 36px; }

  .xaxis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 36px; margin-top: 14px; border-top: 2px solid var(--primary); padding-top: 12px; }
  .xl { text-align: center; }
  .xl .xt { font-size: 14px; font-weight: 700; color: var(--gray-1); line-height: 1.3; }
  .foot { position: absolute; left: 72px; bottom: 30px; font-size: 13px; color: var(--gray-3); font-family: var(--font-mono); }
</style>
</head>
<body data-layout="waterfall" data-screen-label="classic · waterfall">
  <div class="head">
    <div class="kicker">// 손익 · 영업이익 브릿지</div>
    <h1>전년 영업이익 300억에서, 판가 인상이 마진 방어해 480억으로 +180억</h1>
    <div class="rule"></div>
  </div>
  <div class="wf">
    <!-- band max 540 (=480×1.125). base 300, +120→420, +90→510? net check below -->
    <div class="plot">
      <!-- base 300 = 55.6% -->
      <div class="col">
        <div class="seg b-base" style="height:55.6%"><span class="sv">300</span></div>
        <div class="conn" style="bottom:55.6%"></div>
      </div>
      <!-- +120 -> 300..420 (float 55.6%, h 22.2%) top=77.8% -->
      <div class="col">
        <div class="spacer" style="height:55.6%"></div>
        <div class="seg b-up" style="height:22.2%"><span class="sv">+120</span></div>
        <div class="conn" style="bottom:77.8%"></div>
      </div>
      <!-- +90 -> 420..510 (float 77.8%, h 16.7%) top=94.4% — overshoot; use +80 -->
      <div class="col">
        <div class="spacer" style="height:77.8%"></div>
        <div class="seg b-up" style="height:14.8%"><span class="sv">+80</span></div>
        <div class="conn" style="bottom:92.6%"></div>
      </div>
      <!-- -60 -> 500..440 (float 440=81.5%, h 11.1%) top=92.6% -->
      <div class="col">
        <div class="spacer" style="height:81.5%"></div>
        <div class="seg b-down" style="height:11.1%"><span class="sv">-60</span></div>
        <div class="conn" style="bottom:81.5%"></div>
      </div>
      <!-- +40 -> 440..480 (float 81.5%, h 7.4%) top=88.9% -->
      <div class="col">
        <div class="spacer" style="height:81.5%"></div>
        <div class="seg b-up" style="height:7.4%"><span class="sv">+40</span></div>
        <div class="conn" style="bottom:88.9%"></div>
      </div>
      <!-- end 480 = 88.9% -->
      <div class="col">
        <div class="seg b-end" style="height:88.9%"><span class="sv">480</span></div>
      </div>
    </div>
    <div class="xaxis">
      <div class="xl"><div class="xt">FY25<br>영업이익</div></div>
      <div class="xl"><div class="xt">판가<br>인상</div></div>
      <div class="xl"><div class="xt">물량<br>증가</div></div>
      <div class="xl"><div class="xt">원자재<br>상승</div></div>
      <div class="xl"><div class="xt">원가<br>절감</div></div>
      <div class="xl"><div class="xt">FY26<br>영업이익</div></div>
    </div>
  </div>
  <div class="foot">Source: 관리회계 영업이익 브릿지, 단위 억원</div>
<style id="om-fit-scaler-style">
  html { overflow:hidden !important; background:#0a0a0a; }
</style>
<script id="om-fit-scaler">
(function(){
  function fit(){
    var s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    var b = document.body;
    b.style.width='1280px'; b.style.height='720px';
    b.style.position='absolute'; b.style.transformOrigin='top left';
    b.style.left=((window.innerWidth-1280*s)/2)+'px';
    b.style.top=((window.innerHeight-720*s)/2)+'px';
    b.style.transform='scale('+s+')';
  }
  window.addEventListener('resize', fit, {passive:true});
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', fit);
  fit();
})();
</script>
</body>
</html>
