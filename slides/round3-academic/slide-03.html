<!DOCTYPE html>
<html lang="ko" data-theme="academic"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; font-family:'Pretendard', -apple-system, sans-serif;
         background:var(--theme-bg); color:var(--gray-1); padding:54px 72px 48px 72px; display:flex; flex-direction:column; }
  .head { border-bottom:3px solid var(--accent); padding-bottom:14px; margin-bottom:18px; }
  .kicker { font-size:16px; font-weight:700; color:var(--accent); letter-spacing:0.12em; text-transform:uppercase; }
  h1 { font-size:32px; font-weight:800; color:var(--heading, var(--primary)); letter-spacing:-0.01em; line-height:1.2; margin-top:7px; }
  .axis { display:flex; justify-content:center; gap:60px; margin-bottom:18px; }
  .axis p { font-size:15px; color:var(--gray-2); font-weight:600; }
  .axis .base { color:var(--accent); font-weight:800; }
  .tor { display:flex; flex-direction:column; gap:13px; flex:1; }
  .trow { display:grid; grid-template-columns:120px 1fr 1fr 64px; align-items:center; gap:0; }
  .tlb { text-align:right; padding-right:16px; }
  .tlb p { font-size:16px; color:var(--heading, var(--primary)); font-weight:700; }
  .tL { display:flex; justify-content:flex-end; border-right:2px solid var(--gray-3); }
  .tR { display:flex; justify-content:flex-start; }
  .bar { height:26px; }
  .barL { background:var(--gray-3); border-radius:5px 0 0 5px; }
  .barR { background:var(--accent); border-radius:0 5px 5px 0; }
  .tval { padding-left:14px; }
  .tval p { font-size:15px; font-weight:800; color:var(--accent); }
  .tval.muted p { color:var(--gray-2); font-weight:700; }
  .scen { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0; margin-top:18px; }
  .sc { padding:14px 12px; text-align:center; }
  .sc p.l { font-size:15px; font-weight:600; margin-bottom:3px; }
  .sc p.v { font-size:28px; font-weight:800; }
  .sc.best { background:#D1FAE5; border-radius:7px 0 0 7px; }
  .sc.best p { color:#065F46; }
  .sc.base { background:var(--gray-4); }
  .sc.base p { color:var(--heading, var(--primary)); }
  .sc.worst { background:#FEE2E2; border-radius:0 7px 7px 0; }
  .sc.worst p { color:#991B1B; }
  .src { font-size:14px; color:var(--gray-2); margin-top:14px; text-align:right; }
</style></head>
<body data-layout="tornado_chart">
  <div class="head">
    <div class="kicker">Sensitivity Analysis</div>
    <h1>토네이도 차트로 DBEP 핵심 변수의 우선순위를 확정한다</h1>
  </div>

  <div class="axis"><p>← DBEP 단축 (년)</p><p class="base">Base 5.8년</p><p>DBEP 연장 (년) →</p></div>

  <div class="tor">
    <div class="trow"><div class="tlb"><p>판매단가</p></div><div class="tL"><div class="bar barL" style="width:60%;"></div></div><div class="tR"><div class="bar barR" style="width:60%;"></div></div><div class="tval"><p>±1.8년</p></div></div>
    <div class="trow"><div class="tlb"><p>가동률</p></div><div class="tL"><div class="bar barL" style="width:48%;"></div></div><div class="tR"><div class="bar barR" style="width:48%;"></div></div><div class="tval"><p>±1.4년</p></div></div>
    <div class="trow"><div class="tlb"><p>WACC</p></div><div class="tL"><div class="bar barL" style="width:37%;"></div></div><div class="tR"><div class="bar barR" style="width:37%;"></div></div><div class="tval"><p>±1.1년</p></div></div>
    <div class="trow"><div class="tlb"><p>원재료단가</p></div><div class="tL"><div class="bar barL" style="width:26%;"></div></div><div class="tR"><div class="bar barR" style="width:26%;"></div></div><div class="tval muted"><p>±0.8년</p></div></div>
    <div class="trow"><div class="tlb"><p>감가상각법</p></div><div class="tL"><div class="bar barL" style="width:16%;"></div></div><div class="tR"><div class="bar barR" style="width:24%;"></div></div><div class="tval muted"><p>±0.5~1.5</p></div></div>
  </div>

  <div class="scen">
    <div class="sc best"><p class="l">Best Case</p><p class="v">4.2년</p></div>
    <div class="sc base"><p class="l">Base Case</p><p class="v">5.8년</p></div>
    <div class="sc worst"><p class="l">Worst Case</p><p class="v">8.1년</p></div>
  </div>

  <p class="src">Source: Brealey, Myers &amp; Allen (2019); McKinsey "Valuation" 7th Ed. (2020)</p>

<style id="om-fit-scaler-style">html { overflow:hidden !important; background:#0a0a0a; }</style>
<script id="om-fit-scaler">
(function(){function fit(){var s=Math.min(window.innerWidth/1280,window.innerHeight/720);var b=document.body;b.style.width='1280px';b.style.height='720px';b.style.position='absolute';b.style.transformOrigin='top left';b.style.left=((window.innerWidth-1280*s)/2)+'px';b.style.top=((window.innerHeight-720*s)/2)+'px';b.style.transform='scale('+s+')';}window.addEventListener('resize',fit,{passive:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',fit);fit();})();
</script>
</body></html>
