<!DOCTYPE html>
<html lang="ko" data-theme="executive-editorial"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../design-system/colors_and_type.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; font-family:'Pretendard', -apple-system, sans-serif;
         background:var(--theme-bg); color:var(--gray-1); padding:54px 72px 48px 72px; display:flex; flex-direction:column; }
  .head { border-bottom:3px solid var(--accent); padding-bottom:14px; margin-bottom:8px; }
  .kicker { font-size:16px; font-weight:700; color:var(--accent); letter-spacing:0.12em; text-transform:uppercase; }
  h1 { font-size:32px; font-weight:800; color:var(--heading, var(--primary)); letter-spacing:-0.01em; line-height:1.2; margin-top:7px; }
  .legend { display:flex; gap:24px; margin:14px 0 6px 2px; }
  .lg { display:flex; align-items:center; gap:8px; }
  .lg .sw { width:14px; height:14px; border-radius:3px; }
  .lg p { font-size:14px; color:var(--gray-2); font-weight:600; }
  .tl { flex:1; display:flex; flex-direction:column; justify-content:center; position:relative; }
  .line { position:absolute; top:50%; left:20px; right:20px; height:4px; background:var(--gray-3); border-radius:2px; transform:translateY(-50%); }
  .events { display:flex; justify-content:space-between; padding:0 10px; position:relative; }
  .ev { display:flex; flex-direction:column; align-items:center; width:148px; }
  .card { border-radius:9px; padding:11px 8px; width:148px; text-align:center; }
  .card .t { font-size:15px; font-weight:700; color:#FFFFFF; line-height:1.3; }
  .card .s { font-size:13px; color:#FFFFFF; opacity:0.82; margin-top:2px; }
  .dot { width:16px; height:16px; border-radius:50%; border:3px solid var(--theme-bg); z-index:1; margin:10px 0; }
  .date { font-size:14px; color:var(--heading, var(--primary)); font-weight:700; text-align:center; }
  .c-red { background:#B91C1C; } .d-red { background:#B91C1C; }
  .c-org { background:#D97706; } .d-org { background:#D97706; }
  .c-grn { background:#166534; } .d-grn { background:#166534; }
  .ev.down { flex-direction:column; }
  .src { font-size:14px; color:var(--gray-2); margin-top:8px; text-align:right; }
</style></head>
<body data-layout="horizontal_timeline">
  <div class="head">
    <div class="kicker">Triassic · 03</div>
    <h1>트라이아스기 주요 사건 — 대멸종에서 공룡 등장까지</h1>
  </div>
  <div class="legend">
    <div class="lg"><div class="sw" style="background:#B91C1C;"></div><p>대멸종</p></div>
    <div class="lg"><div class="sw" style="background:#D97706;"></div><p>회복·전환</p></div>
    <div class="lg"><div class="sw" style="background:#166534;"></div><p>공룡 등장</p></div>
  </div>

  <div class="tl">
    <div class="line"></div>
    <div class="events">
      <div class="ev"><div class="card c-red"><p class="t">페름기 대멸종</p><p class="s">95% 멸종</p></div><div class="dot d-red"></div><div class="date">2.52억 년 전</div></div>
      <div class="ev"><div class="date">2.47억 년 전</div><div class="dot d-org"></div><div class="card c-org"><p class="t">지구 회복 시작</p></div></div>
      <div class="ev"><div class="card c-grn"><p class="t">나야사사우루스</p><p class="s">최초 공룡 후보</p></div><div class="dot d-grn"></div><div class="date">2.43억 년 전</div></div>
      <div class="ev"><div class="date">2.34억 년 전</div><div class="dot d-org"></div><div class="card c-org"><p class="t">카르니안 다우기</p><p class="s">200만 년 폭우</p></div></div>
      <div class="ev"><div class="card c-grn"><p class="t">에오랍토르</p><p class="s">공룡 등장!</p></div><div class="dot d-grn"></div><div class="date">2.31억 년 전</div></div>
      <div class="ev"><div class="date">2.12억 년 전</div><div class="dot d-red"></div><div class="card c-red"><p class="t">T-J 대멸종</p><p class="s">75% 멸종</p></div></div>
      <div class="ev"><div class="card c-grn"><p class="t">쥐라기 시작</p><p class="s">공룡 황금기!</p></div><div class="dot d-grn"></div><div class="date">2.01억 년 전</div></div>
    </div>
  </div>

  <p class="src">출처: 지질연대표 (ICS 2023)</p>

<style id="om-fit-scaler-style">html { overflow:hidden !important; background:#0a0a0a; }</style>
<script id="om-fit-scaler">
(function(){function fit(){var s=Math.min(window.innerWidth/1280,window.innerHeight/720);var b=document.body;b.style.width='1280px';b.style.height='720px';b.style.position='absolute';b.style.transformOrigin='top left';b.style.left=((window.innerWidth-1280*s)/2)+'px';b.style.top=((window.innerHeight-720*s)/2)+'px';b.style.transform='scale('+s+')';}window.addEventListener('resize',fit,{passive:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',fit);fit();})();
</script>
</body></html>
